name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Railway project
        run: railway link --project vigilant-encouragement --environment production --service puch-maxi-s-anleitung
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Railway
        run: railway up --detach --service puch-maxi-s-anleitung
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
